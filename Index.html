<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Newt Clicker Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: radial-gradient(circle, #2c3e50, #000000); 
            color: white; text-align: center; font-family: 'Segoe UI', sans-serif;
            height: 100vh; overflow: hidden; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .score-container { font-size: 50px; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 20px #f1c40f; }
        .coin-btn { 
            width: 250px; height: 250px; border-radius: 50%; 
            background: url('https://cdn-icons-png.flaticon.com/512/5434/5434403.png'); /* Иконка золотой монеты */
            background-size: cover; border: none; cursor: pointer;
            transition: transform 0.1s active; box-shadow: 0 0 50px rgba(241, 196, 15, 0.2);
        }
        .coin-btn:active { transform: scale(0.9); }
        .stat { font-size: 18px; color: #bdc3c7; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="stat">Твой баланс:</div>
    <div class="score-container" id="balance">0</div>
    <button class="coin-btn" onclick="clickCoin()"></button>
    <div class="stat">Кликай, чтобы разбогатеть!</div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.setText("ВЫВЕСТИ ДЕНЬГИ (СКОРО)").show();

        // Загружаем монеты из памяти
        let count = parseInt(localStorage.getItem('coins')) || 0;
        document.getElementById('balance').innerText = count;

        function clickCoin() {
            count++;
            document.getElementById('balance').innerText = count;
            localStorage.setItem('coins', count); // Сохраняем в память телефона
            if (navigator.vibrate) navigator.vibrate(40);
        }
    </script>
</body>
</html>
