<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Newt Combat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://app.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1a2a35; color: white; text-align: center; margin: 0; overflow: hidden; user-select: none; }
        #score { font-size: 72px; color: #00ffd5; margin-top: 20px; }
        #click-circle {
            width: 250px; height: 250px; border: 8px solid #00ffd5; border-radius: 50%;
            margin: 50px auto; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #2c3e50 0%, #1a2a35 100%);
            box-shadow: 0 0 20px #00ffd5; transition: transform 0.1s; cursor: pointer;
        }
        #click-circle:active { transform: scale(0.95); }
        #newt-img { width: 80%; pointer-events: none; }
        .stats { margin-top: 20px; font-size: 18px; }
        #energy-bar-container { width: 80%; height: 15px; background: #333; margin: 10px auto; border-radius: 10px; }
        #energy-bar { width: 100%; height: 100%; background: #00ffd5; border-radius: 10px; transition: width 0.3s; }
        button {
            padding: 15px 30px; font-size: 18px; border-radius: 10px; border: none; cursor: pointer; margin: 5px; width: 80%;
        }
        #ads-btn { background: #f1c40f; color: black; font-weight: bold; }
        #upgrade-btn { background: #00ffd5; color: black; font-weight: bold; }
    </style>
</head>
<body>
    <div id="score">0</div>
    
    <div id="click-circle" onclick="clickNewt(event)">
        <img src="newt.png" id="newt-img" alt="Triton">
    </div>

    <div class="stats">⚡ Энергия: <span id="energy">1000</span>/1000</div>
    <div id="energy-bar-container"><div id="energy-bar"></div></div>

    <button id="upgrade-btn" onclick="upgrade()">💪 Качать (+2)</button>
    <button id="ads-btn" onclick="showAd()">📺 Реклама (+500)</button>

    <script>
        let score = 0;
        let energy = 1000;
        let power = 2;
        const AdController = window.Adsgram.init({ blockId: "27337" }); // ТВОЙ ID ТУТ!

        function clickNewt(e) {
            if (energy >= power) {
                score += power;
                energy -= power;
                updateUI();
            }
        }

        function upgrade() {
            if (score >= 100) { score -= 100; power += 1; updateUI(); }
        }

        function showAd() {
            AdController.show().then(() => {
                score += 500;
                updateUI();
                alert("Награда получена! +500 очков.");
            }).catch((err) => {
                console.error(err);
                alert("Реклама пока не готова.");
            });
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('energy').innerText = energy;
            document.getElementById('energy-bar').style.width = (energy / 10) + '%';
        }

        setInterval(() => { if (energy < 1000) { energy += 5; updateUI(); } }, 2000);
    </script>
</body>
</html>
