<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Newt Combat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: radial-gradient(circle, #0f2027, #203a43, #2c5364); 
            color: white; text-align: center; font-family: 'Arial', sans-serif;
            height: 100vh; overflow: hidden; margin: 0; display: flex; flex-direction: column; align-items: center; 
        }
        .header { margin-top: 20px; }
        .score { font-size: 50px; font-weight: 900; color: #00ffcc; text-shadow: 0 0 15px rgba(0, 255, 204, 0.5); }
        
        .coin-section { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; width: 100%; }
        .coin-btn { 
            width: 260px; height: 260px; border-radius: 50%; 
            background: url('https://img.icons8.com/clouds/500/salamander.png') center/cover; /* Тритончик */
            border: 8px solid #00ffcc; outline: none; transition: transform 0.05s;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
            -webkit-tap-highlight-color: transparent;
        }
        .coin-btn:active { transform: scale(0.95); }

        .energy-section { width: 85%; margin-bottom: 30px; }
        .energy-bar { width: 100%; height: 10px; background: #111; border-radius: 10px; margin-top: 5px; }
        .energy-fill { width: 100%; height: 100%; background: #00ffcc; transition: width 0.2s; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .upgrade-btn { background: #00ffcc; border: none; color: #000; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 14px; }
        
        .plus-one { position: absolute; color: #00ffcc; font-size: 30px; font-weight: 900; pointer-events: none; animation: float 0.6s linear forwards; }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>
    <div class="header">
        <div style="color: #aaa;">NEWT COINS</div>
        <div class="score" id="balance">0</div>
    </div>

    <div class="coin-section" id="wrapper">
        <button class="coin-btn" id="coinBtn"></button>
    </div>

    <div class="energy-section">
        <div style="display:flex; justify-content:space-between; font-size: 14px;">
            <span>⚡ Энергия</span>
            <span id="energy-val">1000 / 1000</span>
        </div>
        <div class="energy-bar"><div class="energy-fill" id="energy-fill"></div></div>
    </div>

    <div class="btn-group">
        <button class="upgrade-btn" onclick="upgradeClick()">💪 Клик: +<span id="upg-val">1</span> (<span id="upg-price">50</span>)</button>
        <button class="upgrade-btn" style="background:#f1c40f" onclick="alert('ТОП ИГРОКОВ:\n1. ТЫ (Красава)\n2. Janh (0 монет)\n3. Dayana (0 монет)')">🏆 ТОП</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let coins = Number(localStorage.getItem('n_coins')) || 0;
        let energy = Number(localStorage.getItem('n_energy')) || 1000;
        let power = Number(localStorage.getItem('n_power')) || 1;
        let price = Number(localStorage.getItem('n_price')) || 50;

        function update() {
            document.getElementById('balance').innerText = Math.floor(coins);
            document.getElementById('energy-val').innerText = `${energy} / 1000`;
            document.getElementById('energy-fill').style.width = (energy/10) + '%';
            document.getElementById('upg-val').innerText = power;
            document.getElementById('upg-price').innerText = price;
            
            localStorage.setItem('n_coins', coins);
            localStorage.setItem('n_energy', energy);
            localStorage.setItem('n_power', power);
            localStorage.setItem('n_price', price);
        }

        document.getElementById('coinBtn').addEventListener('click', (e) => {
            if (energy >= power) {
                coins += power;
                energy -= power;
                
                let p = document.createElement('div');
                p.innerText = `+${power}`;
                p.className = 'plus-one';
                p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 600);
                
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                update();
            }
        });

        setInterval(() => { if (energy < 1000) energy++; update(); }, 1500);
        
        window.upgradeClick = function() {
            if (coins >= price) {
                coins -= price;
                power++;
                price = Math.floor(price * 1.8);
                update();
            }
        };

        update();
    </script>
</body>
</html>
