<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newt Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #1a1a1a; color: white; text-align: center; font-family: sans-serif; }
        .coin { font-size: 48px; margin-top: 50px; color: #f1c40f; }
        .button { 
            width: 200px; height: 200px; border-radius: 50%; 
            background: linear-gradient(145deg, #f1c40f, #d4ac0d);
            margin: 50px auto; display: flex; align-items: center; 
            justify-content: center; font-size: 80px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="coin" id="balance">0</div>
    <div class="button" onclick="clickCoin()">💸</div>

    <script>
        let tg = window.Telegram.WebApp;
        let count = 0;
        tg.expand(); // Раскрывает окно на весь экран

        function clickCoin() {
            count++;
            document.getElementById('balance').innerText = count;
            if (navigator.vibrate) navigator.vibrate(50); // Вибрация при клике
        }
    </script>
</body>
</html>
